<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SNEAKER Website</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="file.css">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">SNEAKER</a>

    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('home')">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('gallery')">Gallery</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('cart')">Cart 🛒 (<span id="cart-count">0</span>)</a></li>
      <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('contact')">Contact</a></li>
    </ul>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page container text-center mt-5">
  <h1>Urban Runner X</h1>
  <p>Premium Sneakers for Daily Use</p>
  <button class="btn btn-primary" onclick="showPage('gallery')">View Gallery</button>
</div>

<!-- GALLERY -->
<div id="gallery" class="page container mt-4" style="display:none;">

<h2 class="text-center">Gallery</h2>

<div class="text-center mb-3">
  <button class="btn btn-dark" onclick="filterSelection('all')">All</button>
  <button class="btn btn-primary" onclick="filterSelection('black')">Black</button>
  <button class="btn btn-light" onclick="filterSelection('white')">White</button>
</div>

<div class="row">

  <!-- 10 Images -->
  <div class="col-md-3 mb-3 filter black"><img src="qq.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter white"><img src="ww.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter black"><img src="eee.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter white"><img src="tt.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter black"><img src="yy.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter white"><img src="uu.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter black"><img src="ii.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter white"><img src=".jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter black"><img src="img9.jpg" class="img-fluid gallery-img"></div>
  <div class="col-md-3 mb-3 filter white"><img src="img10.jpg" class="img-fluid gallery-img"></div>

</div>

</div>

<!-- CART -->
<div id="cart" class="page container text-center mt-5" style="display:none;">
  <h2>Your Cart</h2>
  <p>Total Items: <span id="cart-count-2">0</span></p>
</div>

<!-- CONTACT -->
<div id="contact" class="page container mt-5" style="display:none;">
  <h2>Contact Us</h2>

  <form>
    <input class="form-control mb-2" placeholder="Name">
    <input class="form-control mb-2" placeholder="Email">
    <textarea class="form-control mb-2" placeholder="Message"></textarea>
    <button class="btn btn-primary">Send</button>
  </form>
</div>

<footer class="footer text-center mt-5 p-3 bg-dark text-white">
  © 2026 SNEAKER Store
</footer>

<script src="script.js"></script>

</body>
</html>
